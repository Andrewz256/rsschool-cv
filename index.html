<!DOCTYPE html>
<html lang="en">
    <head>
       <meta charset="UTF-8">
       <title>Cat Clicker</title>
       <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <div id="catsView">
            <h2 id="catName"></h2>
            <div id="catCount"></div>
            <img id="catImg" src="" alt="cats">
        </div >
        <div id="cats">
            <ul id="catsList"></ul>
            <button id="editBut">Edit Cat</button>
            <div id="editCats">
                <p>Name<input type="text" size="29" id="cname"></p>
                <p>ImgURL<input type="text" size="27" id="cimg"></p>
                <p>#click<input type="number" size="5"id="cclick"></p>
                <button id="saveBut">Save Cat</button>
                <button id="cancelBut">Cancel Edit</button>
            </div>
        </div>

    </body>
</html>
